name: deploy
# Manual until launch: flip to `on: push` once the Firebase site + custom domain
# + FIREBASE_SERVICE_ACCOUNT_ALPIBRU_COMMON secret are set (see DEPLOYMENT.md).
on:
  workflow_dispatch:
jobs:
  firebase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ github.token }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ALPIBRU_COMMON }}
          projectId: alpibru-common
          target: lex
          channelId: live
